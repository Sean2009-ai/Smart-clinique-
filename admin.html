<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartClinique Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#fff">
<div id="root"></div>
<script type="text/babel">

const API = "https://smart-clinique-tm2k.onrender.com";
const G   = "#7c3aed";

function Spinner() {
  return <div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>⏳ Chargement...</div>;
}

function ApiError() {
  return (
    <div style={{background:"#1f0d0d",borderRadius:12,padding:16,color:"#f87171",fontSize:13,textAlign:"center"}}>
      ⚠️ Impossible de contacter le serveur.<br/>
      <span style={{color:"#9ca3af"}}>Vérifiez que le backend Render est actif.</span>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────
function Dashboard() {
  const [stats, setStats]   = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError]   = React.useState(false);

  React.useEffect(() => {
    fetch(API + "/api/stats")
      .then(r => r.json())
      .then(d => { setStats(d); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
  }, []);

  if (loading) return <Spinner />;
  if (error)   return <ApiError />;

  const cards = [
    { label: "Patients total",  value: stats.total_patients,     color: "#10b981", icon: "👥" },
    { label: "RDV total",       value: stats.total_appointments, color: "#3b82f6", icon: "📅" },
    { label: "Confirmés",       value: stats.confirmed,          color: "#f59e0b", icon: "✅" },
    { label: "Conversations",   value: stats.conversations,      color: "#7c3aed", icon: "💬" },
  ];

  return (
    <div>
      <h2 style={{margin:"0 0 16px",fontSize:20}}>Vue globale</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
        {cards.map((s,i) => (
          <div key={i} style={{background:"#1a1a1a",borderRadius:12,padding:16,borderTop:`3px solid ${s.color}`}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{s.label}</div>
            <div style={{fontSize:26,fontWeight:700,color:s.color}}>{s.value ?? 0}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CLINIQUES ─────────────────────────────────────────────
function Clinics() {
  const [clinic, setClinic] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError]   = React.useState(false);
  const [editing, setEditing] = React.useState(false);
  const [form, setForm]     = React.useState({});
  const [saving, setSaving] = React.useState(false);
  const [saved, setSaved]   = React.useState(false);

  React.useEffect(() => {
    fetch(API + "/api/clinic")
      .then(r => r.json())
      .then(d => { setClinic(d); setForm(d); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
  }, []);

  async function save() {
    setSaving(true);
    await fetch(API + "/api/clinic", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(form)
    });
    setClinic(form);
    setSaving(false);
    setSaved(true);
    setEditing(false);
    setTimeout(() => setSaved(false), 3000);
  }

  if (loading) return <Spinner />;
  if (error)   return <ApiError />;

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{margin:0,fontSize:20}}>Clinique</h2>
        <button onClick={() => setEditing(!editing)} style={{
          background: editing ? "#1a1a1a" : G, border:"none", borderRadius:10,
          padding:"8px 16px", color: editing ? "#9ca3af" : "#fff",
          cursor:"pointer", fontWeight:600, fontSize:13, fontFamily:"'DM Sans',sans-serif"
        }}>
          {editing ? "Annuler" : "✏️ Modifier"}
        </button>
      </div>

      <div style={{background:"#1a1a1a",borderRadius:14,padding:16}}>
        {[
          {key:"name",    label:"Nom de la clinique"},
          {key:"phone",   label:"Téléphone"},
          {key:"address", label:"Adresse"},
          {key:"hours",   label:"Horaires"},
          {key:"prices",  label:"Tarifs"},
        ].map(f => (
          <div key={f.key} style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:5}}>{f.label}</div>
            {editing ? (
              <input value={form[f.key] || ""} onChange={e => setForm(p => ({...p,[f.key]:e.target.value}))}
                style={{width:"100%",background:"#0a0a0a",border:"1px solid #333",borderRadius:8,padding:"10px",color:"#fff",fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"'DM Sans',sans-serif"}}
              />
            ) : (
              <div style={{fontSize:14,color:"#d1d5db",padding:"10px",background:"#0a0a0a",borderRadius:8}}>
                {clinic[f.key] || <span style={{color:"#555"}}>Non renseigné</span>}
              </div>
            )}
          </div>
        ))}

        {saved && (
          <div style={{background:"#1e1b4b",borderRadius:10,padding:10,color:"#a5b4fc",fontSize:13,marginBottom:12,textAlign:"center"}}>
            ✅ Modifications sauvegardées !
          </div>
        )}

        {editing && (
          <button onClick={save} disabled={saving} style={{
            width:"100%",background:G,border:"none",borderRadius:10,padding:"12px",
            color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14,fontFamily:"'DM Sans',sans-serif"
          }}>
            {saving ? "⏳ Sauvegarde..." : "💾 Sauvegarder"}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── RENDEZ-VOUS ───────────────────────────────────────────
function Appointments() {
  const [apts, setApts]     = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError]   = React.useState(false);

  function load() {
    setLoading(true);
    fetch(API + "/api/appointments")
      .then(r => r.json())
      .then(d => { setApts(d); setLoading(false); })
      .catch(() => { setError(true); setLoading(false); });
  }

  React.useEffect(load, []);

  async function updateStatus(id, status) {
    await fetch(`${API}/api/appointments/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status })
    });
    load();
  }

  async function deleteApt(id) {
    await fetch(`${API}/api/appointments/${id}`, { method: "DELETE" });
    load();
  }

  if (loading) return <Spinner />;
  if (error)   return <ApiError />;

  return (
    <div>
      <h2 style={{margin:"0 0 16px",fontSize:20}}>Rendez-vous</h2>
      {apts.length === 0 ? (
        <div style={{textAlign:"center",padding:40,color:"#9ca3af",fontSize:14}}>
          Aucun rendez-vous enregistré
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {apts.map(a => (
            <div key={a.id} style={{background:"#1a1a1a",borderRadius:12,padding:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{a.name}</div>
                  <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>📞 {a.phone}</div>
                  <div style={{fontSize:12,color:"#9ca3af"}}>{a.type}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontWeight:600,color:"#a5b4fc",fontSize:13}}>{a.date}</div>
                  <div style={{color:"#9ca3af",fontSize:12}}>{a.time}</div>
                  <span style={{
                    background: a.status==="confirmé"?"#064e3b":"#431407",
                    color: a.status==="confirmé"?"#34d399":"#fb923c",
                    borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600
                  }}>{a.status}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                {a.status !== "confirmé" && (
                  <button onClick={() => updateStatus(a.id, "confirmé")} style={{
                    flex:1,background:"#064e3b",border:"none",borderRadius:8,padding:"7px",
                    color:"#34d399",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"
                  }}>✅ Confirmer</button>
                )}
                <button onClick={() => deleteApt(a.id)} style={{
                  flex:1,background:"#1f0d0d",border:"none",borderRadius:8,padding:"7px",
                  color:"#f87171",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"
                }}>🗑 Supprimer</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── APP PRINCIPALE ────────────────────────────────────────
function Admin() {
  const [tab, setTab] = React.useState("dashboard");

  const tabs = [
    {id:"dashboard",    icon:"📊", label:"Stats"},
    {id:"clinics",      icon:"🏥", label:"Clinique"},
    {id:"appointments", icon:"📅", label:"RDV"},
  ];

  const screens = {
    dashboard:    <Dashboard />,
    clinics:      <Clinics />,
    appointments: <Appointments />,
  };

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#4c1d95,#7c3aed)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:36,height:36,background:"rgba(255,255,255,0.2)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⚡</div>
        <div>
          <div style={{fontWeight:700,fontSize:16}}>SmartClinique Admin</div>
          <div style={{fontSize:11,opacity:.8}}>Panneau de contrôle</div>
        </div>
        <div style={{marginLeft:"auto",background:"rgba(255,255,255,0.15)",borderRadius:20,padding:"4px 12px",fontSize:11}}>
          🔐 Accès restreint
        </div>
      </div>

      <div style={{flex:1,padding:16,overflowY:"auto"}}>
        {screens[tab]}
      </div>

      <div style={{background:"#111",borderTop:"1px solid #222",padding:"8px 0",display:"flex",justifyContent:"space-around"}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background:"none",border:"none",cursor:"pointer",
            display:"flex",flexDirection:"column",alignItems:"center",
            gap:3,padding:"4px 12px",color:tab===t.id?G:"#6b7280",
            fontSize:11,fontWeight:tab===t.id?700:400,fontFamily:"'DM Sans',sans-serif"
          }}>
            <span style={{fontSize:20}}>{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<Admin/>, document.getElementById("root"));
</script>
</body>
</html>
